name: 构建安装包

on:
  push:
    tags:
      - 'v*'           # 推送标签时触发，例如 v2.0.0
  workflow_dispatch:   # 也可手动触发

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      - name: dotnet publish（self-contained）
        run: |
          dotnet publish TaskbarLyrics.App/TaskbarLyrics.App.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:SatelliteResourceLanguages=zh-Hans `
            -p:DebugType=None -p:DebugSymbols=false `
            -o publish/win-x64

      - name: 读取版本号
        id: get_version
        shell: pwsh
        run: |
          $tag = "${env:GITHUB_REF_NAME}"
          if ($tag -match '^v\d+(\.\d+){1,3}$') {
            $ver = $tag.TrimStart('v')
          } else {
            $info = [System.Diagnostics.FileVersionInfo]::GetVersionInfo("publish/win-x64/TaskbarLyrics.exe")
            $ver = $info.FileVersion
            if ([string]::IsNullOrWhiteSpace($ver)) { $ver = $info.ProductVersion }
          }
          echo "version=$ver" >> $env:GITHUB_OUTPUT
          echo "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: 安装 Inno Setup
        shell: pwsh
        run: |
          $paths = @(
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
            "${env:ProgramFiles}\Inno Setup 6\ISCC.exe",
            "${env:LOCALAPPDATA}\Programs\Inno Setup 6\ISCC.exe"
          )
          if (-not ($paths | Where-Object { Test-Path $_ } | Select-Object -First 1)) {
            winget install --id JRSoftware.InnoSetup --exact --silent --accept-package-agreements --accept-source-agreements
          }

      - name: 编译安装包
        shell: pwsh
        run: |
          .\scripts\build-installer.ps1 -SkipPublish -AppVersion "${{ steps.get_version.outputs.version }}"

      - name: 上传安装包
        uses: actions/upload-artifact@v4
        with:
          name: TaskbarLyrics-${{ steps.get_version.outputs.version }}-Setup
          path: dist/TaskbarLyrics-*-Setup.exe

      - name: 创建 Release（仅标签触发）
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/TaskbarLyrics-*-Setup.exe
          generate_release_notes: true
