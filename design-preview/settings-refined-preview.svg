<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <linearGradient id="windowBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#081121"/>
      <stop offset=".52" stop-color="#07101f"/>
      <stop offset="1" stop-color="#050914"/>
    </linearGradient>
    <linearGradient id="sidebarBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#101c34" stop-opacity=".78"/>
      <stop offset="1" stop-color="#070e1d" stop-opacity=".88"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#101c34" stop-opacity=".82"/>
      <stop offset="1" stop-color="#0b1528" stop-opacity=".82"/>
    </linearGradient>
    <style>
      .font { font-family: "Segoe UI", "Microsoft YaHei UI", Arial, sans-serif; }
      .title { fill: #f8fafc; font-size: 28px; font-weight: 650; }
      .subtitle { fill: rgba(255,255,255,.48); font-size: 13px; }
      .card-title { fill: #f8fafc; font-size: 18px; font-weight: 650; }
      .desc { fill: rgba(255,255,255,.42); font-size: 12px; }
      .label { fill: #f8fafc; font-size: 14px; font-weight: 640; }
      .small { fill: rgba(255,255,255,.34); font-size: 12px; }
      .nav { fill: rgba(255,255,255,.72); font-size: 15px; font-weight: 520; }
      .line { stroke: rgba(120,160,255,.12); stroke-width: 1; }
    </style>
  </defs>

  <rect width="1440" height="900" fill="#050914"/>
  <rect x="0.5" y="0.5" width="1439" height="899" rx="18" fill="url(#windowBg)" stroke="rgba(180,205,255,.18)"/>

  <g class="font">
    <rect x="0" y="0" width="248" height="900" fill="url(#sidebarBg)"/>
    <line x1="248" y1="0" x2="248" y2="900" stroke="rgba(120,160,255,.18)"/>
    <text x="34" y="64" fill="#55a2ff" font-size="31">♪</text>
    <text x="76" y="63" fill="#f8fafc" font-size="20" font-weight="650">TaskbarLyrics</text>

    <g transform="translate(14,112)">
      <rect x="0" y="0" width="220" height="48" rx="10" fill="rgba(77,122,255,.15)" stroke="rgba(77,122,255,.18)"/>
