        <rect x="996" y="16" width="44" height="24" rx="12" fill="#4d7aff" stroke="#6b91ff"/><circle cx="1026" cy="28" r="9" fill="#fff"/>

        <rect y="66" width="521" height="56" rx="11" fill="rgba(11,21,40,.76)" stroke="rgba(120,160,255,.13)"/>
        <rect x="14" y="78" width="32" height="32" rx="9" fill="#2563eb"/><text x="25" y="100" fill="#fff" font-size="15" font-weight="800">K</text>
        <text x="60" y="100" class="label">酷狗音乐</text>
        <rect x="463" y="82" width="44" height="24" rx="12" fill="#4d7aff" stroke="#6b91ff"/><circle cx="493" cy="94" r="9" fill="#fff"/>

        <rect x="533" y="66" width="521" height="56" rx="11" fill="rgba(11,21,40,.76)" stroke="rgba(120,160,255,.13)"/>
        <rect x="547" y="78" width="32" height="32" rx="9" fill="#22c55e"/><text x="558" y="100" fill="#052e16" font-size="15" font-weight="800">S</text>
