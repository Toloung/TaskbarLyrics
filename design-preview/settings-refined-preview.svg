        <rect y="100" width="1054" height="42" rx="10" fill="rgba(11,21,40,.76)" stroke="rgba(120,160,255,.13)"/>
        <text x="14" y="126" class="label">显示背景</text><text x="160" y="126" class="small">为歌词窗口启用半透明背景。</text>
