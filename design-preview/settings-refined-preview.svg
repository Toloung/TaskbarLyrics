      <text x="34" y="30" fill="#eaf2ff" font-size="17">▷</text>
      <text x="72" y="31" fill="#eaf2ff" font-size="15" font-weight="600">播放器</text>

      <text x="34" y="82" class="nav">Aa</text><text x="72" y="82" class="nav">歌词</text>
      <text x="34" y="134" class="nav">▧</text><text x="72" y="134" class="nav">外观</text>
      <text x="34" y="186" class="nav">▦</text><text x="72" y="186" class="nav">布局</text>
      <text x="34" y="238" class="nav">♢</text><text x="72" y="238" class="nav">调试</text>
