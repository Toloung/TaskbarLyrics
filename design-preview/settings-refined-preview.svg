        <rect x="996" y="82" width="44" height="24" rx="12" fill="#4d7aff" stroke="#6b91ff"/><circle cx="1026" cy="94" r="9" fill="#fff"/>
      </g>

      <g transform="translate(21,216)">
        <rect width="1054" height="50" rx="12" fill="rgba(8,17,34,.5)" stroke="rgba(120,160,255,.12)"/>
        <text x="18" y="31" fill="rgba(255,255,255,.34)" font-size="15">≡</text>
        <text x="52" y="31" class="label">QQ音乐</text>
        <text x="220" y="31" fill="rgba(255,255,255,.34)" font-size="15">≡</text>
        <text x="254" y="31" class="label">网易云音乐</text>
        <text x="470" y="31" fill="rgba(255,255,255,.34)" font-size="15">≡</text>
