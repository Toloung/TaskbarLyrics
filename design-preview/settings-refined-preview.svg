        <rect x="996" y="9" width="44" height="24" rx="12" fill="#4d7aff" stroke="#6b91ff"/><circle cx="1026" cy="21" r="9" fill="#fff"/>
        <rect y="50" width="1054" height="42" rx="10" fill="rgba(11,21,40,.76)" stroke="rgba(120,160,255,.13)"/>
        <text x="14" y="76" class="label">显示歌词翻译</text><text x="160" y="76" class="small">统一控制各歌词源的翻译显示。</text>
