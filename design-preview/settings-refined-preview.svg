      <rect x="21" y="78" width="497" height="38" rx="9" fill="rgba(11,21,40,.76)" stroke="rgba(120,160,255,.13)"/>
      <text x="35" y="102" class="label">字号</text><rect x="260" y="84" width="244" height="26" rx="7" fill="#081122" stroke="rgba(120,160,255,.16)"/><text x="274" y="103" fill="#f8fafc" font-size="13">14</text>
      <rect x="21" y="124" width="497" height="38" rx="9" fill="rgba(11,21,40,.76)" stroke="rgba(120,160,255,.13)"/>
      <text x="35" y="148" class="label">字体</text><rect x="260" y="130" width="244" height="26" rx="7" fill="#081122" stroke="rgba(120,160,255,.16)"/><text x="274" y="149" fill="#f8fafc" font-size="13">SF Pro Display</text>

      <rect x="557" width="539" height="168" rx="17" fill="url(#cardBg)" stroke="rgba(120,160,255,.12)"/>
      <text x="578" y="35" class="card-title">窗口设置</text>
      <text x="578" y="59" class="desc">调整任务栏歌词窗口的位置、宽度与透明度。</text>
      <rect x="578" y="78" width="497" height="38" rx="9" fill="rgba(11,21,40,.76)" stroke="rgba(120,160,255,.13)"/>
      <text x="592" y="102" class="label">背景不透明度</text><rect x="817" y="84" width="244" height="26" rx="7" fill="#081122" stroke="rgba(120,160,255,.16)"/><text x="831" y="103" fill="#f8fafc" font-size="13">0.55</text>
      <rect x="578" y="124" width="497" height="38" rx="9" fill="rgba(11,21,40,.76)" stroke="rgba(120,160,255,.13)"/>
      <text x="592" y="148" class="label">窗口宽度 (px)</text><rect x="817" y="130" width="244" height="26" rx="7" fill="#081122" stroke="rgba(120,160,255,.16)"/><text x="831" y="149" fill="#f8fafc" font-size="13">420</text>
